databases:
  - name: conecta-pontos-db
    databaseName: conectapontos
    user: conectapontos
    plan: free

services:
  - type: web
    name: conecta-pontos-app
    env: node
    plan: free
    buildCommand: npm install && npx expo export -p web && cd backend && npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conecta-pontos-db
          property: connectionString
