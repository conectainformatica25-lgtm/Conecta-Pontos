databases:
  - name: conecta-pontos-db
    databaseName: conectapontos
    user: conectapontos

services:
  - type: web
    name: conecta-pontos-api
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conecta-pontos-db
          property: connectionString
      - key: PORT
        value: 3000

  - type: web
    name: conecta-pontos-web
    env: static
    buildCommand: npm install && npx expo export -p web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          type: web
          name: conecta-pontos-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
